<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solaris CRM — Automation System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --void:#050816;
  --space-blue:#071A52;
  --space-blue-2:#0B2470;
  --solar-orange:#FF8C00;
  --golden:#FFD54F;
  --cyan:#00E5FF;
  --purple:#7C4DFF;
  --text:#EAF0FF;
  --text-dim:#9BA8CC;
  --glass:rgba(255,255,255,0.055);
  --glass-border:rgba(255,255,255,0.12);
  --glass-hi:rgba(255,255,255,0.09);
  --radius:18px;
  --font-display:'Orbitron',sans-serif;
  --font-body:'Manrope',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --danger:#FF5C7A;
  --success:#31D8A4;
  --warn:#FFB547;
}
html.light{
  --void:#EEF1FB;
  --space-blue:#DCE3FA;
  --text:#0B1230;
  --text-dim:#4A5480;
  --glass:rgba(20,30,80,0.05);
  --glass-border:rgba(20,30,80,0.12);
  --glass-hi:rgba(20,30,80,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:var(--font-body);
  background:var(--void);
  color:var(--text);
  overflow-x:hidden;
  min-height:100vh;
  transition:background .4s ease,color .4s ease;
}
::selection{background:var(--cyan);color:#00131a;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--glass-border);border-radius:8px;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,select,textarea{font-family:inherit;color:var(--text);}

/* ---------- Backdrop: stars / aurora / orbs ---------- */
#bg-layer{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;background:
  radial-gradient(ellipse at 20% 10%, rgba(124,77,255,0.20), transparent 55%),
  radial-gradient(ellipse at 80% 0%, rgba(0,229,255,0.14), transparent 50%),
  radial-gradient(ellipse at 50% 100%, rgba(255,140,0,0.10), transparent 60%),
  linear-gradient(180deg,var(--void),var(--space-blue) 140%);
}
html.light #bg-layer{background:
  radial-gradient(ellipse at 20% 10%, rgba(124,77,255,0.10), transparent 55%),
  radial-gradient(ellipse at 80% 0%, rgba(0,229,255,0.10), transparent 50%),
  linear-gradient(180deg,var(--void),var(--space-blue) 140%);
}
#starcanvas{position:absolute;inset:0;width:100%;height:100%;}
.orb{position:absolute;border-radius:50%;filter:blur(50px);opacity:.35;animation:float-orb 18s ease-in-out infinite;}
.orb1{width:340px;height:340px;background:var(--purple);top:-80px;left:-60px;animation-delay:0s;}
.orb2{width:280px;height:280px;background:var(--cyan);bottom:-60px;right:-40px;animation-delay:-6s;}
.orb3{width:220px;height:220px;background:var(--solar-orange);bottom:20%;left:40%;animation-delay:-11s;}
@keyframes float-orb{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(30px,-40px) scale(1.12);}}

.sun{position:absolute;border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #FFF6D6, var(--golden) 40%, var(--solar-orange) 75%);
  box-shadow:0 0 90px 30px rgba(255,140,0,0.55), 0 0 200px 90px rgba(255,140,0,0.18);
  animation:pulse-sun 6s ease-in-out infinite;
}
@keyframes pulse-sun{0%,100%{filter:brightness(1);}50%{filter:brightness(1.15);}}
.orbit{position:absolute;border:1px solid rgba(255,255,255,0.08);border-radius:50%;}
.planet{position:absolute;border-radius:50%;top:50%;left:0;transform:translateY(-50%);}
.orbit-spin{animation:spin linear infinite;}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

/* meteor / shooting star */
.meteor{position:absolute;width:2px;height:2px;background:linear-gradient(90deg,#fff,transparent);border-radius:50%;
  box-shadow:0 0 0 1px rgba(255,255,255,.1);opacity:0;animation:meteor-fly 5s linear infinite;}
@keyframes meteor-fly{
  0%{opacity:0;transform:translate(0,0) scale(.4);}
  3%{opacity:1;}
  20%{opacity:0;transform:translate(-420px,420px) scale(1);}
  100%{opacity:0;}
}
#cursor-glow{position:fixed;width:260px;height:260px;border-radius:50%;pointer-events:none;z-index:1;
  background:radial-gradient(circle, rgba(0,229,255,0.10), transparent 70%);
  transform:translate(-50%,-50%);transition:opacity .3s;left:-999px;top:-999px;}

/* ---------- App shell ---------- */
#root{position:relative;z-index:2;min-height:100vh;}
.hidden{display:none !important;}

.glass{
  background:var(--glass);
  border:1px solid var(--glass-border);
  backdrop-filter:blur(18px) saturate(140%);
  -webkit-backdrop-filter:blur(18px) saturate(140%);
  border-radius:var(--radius);
}
.glass-hi{background:var(--glass-hi);}

/* ---- Login ---- */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;padding:20px;}
.login-card{width:400px;max-width:100%;padding:40px 34px;text-align:center;position:relative;animation:card-in .7s ease both;}
@keyframes card-in{from{opacity:0;transform:translateY(24px) scale(.97);}to{opacity:1;transform:none;}}
.login-card.shake{animation:shake-anim .45s ease;}
@keyframes shake-anim{
  10%,90%{transform:translateX(-1px);} 20%,80%{transform:translateX(2px);}
  30%,50%,70%{transform:translateX(-4px);} 40%,60%{transform:translateX(4px);}
}
.login-logo{font-family:var(--font-display);font-size:26px;letter-spacing:2px;font-weight:900;
  background:linear-gradient(90deg,var(--golden),var(--solar-orange),var(--cyan));
  -webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:6px;}
.login-sub{color:var(--text-dim);font-size:13px;margin-bottom:26px;}
.field{text-align:left;margin-bottom:16px;}
.field label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:6px;letter-spacing:.3px;}
.field .input-wrap{position:relative;}
.field input,.field select,.field textarea{
  width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--glass-border);
  background:rgba(255,255,255,0.04);color:var(--text);font-size:14px;outline:none;transition:border .2s,box-shadow .2s;}
html.light .field input, html.light .field select, html.light .field textarea{background:rgba(10,20,60,0.03);}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,229,255,0.15);}
.field-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text-dim);margin:6px 0 20px;}
.checkbox-line{display:flex;align-items:center;gap:6px;}
.link-btn{color:var(--cyan);cursor:pointer;}
.link-btn:hover{text-decoration:underline;}

.btn{
  position:relative;overflow:hidden;padding:12px 20px;border-radius:12px;font-weight:700;font-size:14px;
  display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:transform .15s, box-shadow .2s, filter .2s;
}
.btn:active{transform:scale(.97);}
.btn-primary{background:linear-gradient(90deg,var(--solar-orange),var(--golden));color:#20140A;
  box-shadow:0 6px 22px rgba(255,140,0,0.35);}
.btn-primary:hover{filter:brightness(1.08);box-shadow:0 8px 28px rgba(255,140,0,0.5);}
.btn-block{width:100%;}
.btn-ghost{background:var(--glass);border:1px solid var(--glass-border);color:var(--text);}
.btn-ghost:hover{background:var(--glass-hi);}
.btn-outline{border:1px solid var(--glass-border);color:var(--text);background:transparent;}
.btn-outline:hover{background:var(--glass);}
.btn-danger{background:rgba(255,92,122,0.15);color:var(--danger);border:1px solid rgba(255,92,122,0.35);}
.btn-danger:hover{background:rgba(255,92,122,0.25);}
.btn-sm{padding:7px 12px;font-size:12.5px;border-radius:9px;}
.btn-icon{width:36px;height:36px;padding:0;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;}
.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,0.5);transform:scale(0);animation:ripple-anim .6s ease-out;pointer-events:none;}
@keyframes ripple-anim{to{transform:scale(3);opacity:0;}}

.divider-or{display:flex;align-items:center;gap:10px;color:var(--text-dim);font-size:11px;margin:18px 0;}
.divider-or::before,.divider-or::after{content:'';flex:1;height:1px;background:var(--glass-border);}

/* ---- Shell layout ---- */
#app-shell{display:flex;min-height:100vh;}
#sidebar{width:230px;flex-shrink:0;padding:20px 14px;display:flex;flex-direction:column;gap:6px;
  position:sticky;top:0;height:100vh;overflow-y:auto;transition:width .3s ease;border-right:1px solid var(--glass-border);}
#sidebar.collapsed{width:76px;}
.brand{display:flex;align-items:center;gap:10px;padding:8px 8px 22px;}
.brand-mark{width:34px;height:34px;border-radius:10px;flex-shrink:0;
  background:radial-gradient(circle at 35% 30%,#FFF6D6,var(--golden) 45%,var(--solar-orange) 90%);
  box-shadow:0 0 18px rgba(255,140,0,.6);}
.brand-name{font-family:var(--font-display);font-weight:700;font-size:15px;letter-spacing:1px;white-space:nowrap;overflow:hidden;}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:12px;color:var(--text-dim);
  font-size:13.5px;font-weight:600;transition:all .2s;position:relative;white-space:nowrap;overflow:hidden;}
.nav-item i{width:18px;text-align:center;font-size:15px;transition:transform .25s;flex-shrink:0;}
.nav-item:hover{background:var(--glass);color:var(--text);}
.nav-item:hover i{transform:translateY(-2px) rotate(-6deg);}
.nav-item.active{background:linear-gradient(90deg,rgba(255,140,0,0.18),rgba(0,229,255,0.10));color:var(--text);}
.nav-item.active::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:3px;
  background:linear-gradient(180deg,var(--solar-orange),var(--cyan));}
.nav-badge{margin-left:auto;background:var(--danger);color:#fff;font-size:10px;font-weight:800;border-radius:20px;padding:1px 7px;}
#sidebar-toggle{margin-top:auto;color:var(--text-dim);padding:10px;border-radius:10px;}
#sidebar-toggle:hover{background:var(--glass);}

#main-col{flex:1;min-width:0;display:flex;flex-direction:column;}
#topbar{display:flex;align-items:center;gap:16px;padding:16px 26px;border-bottom:1px solid var(--glass-border);
  position:sticky;top:0;z-index:20;background:rgba(5,8,22,0.55);backdrop-filter:blur(16px);}
html.light #topbar{background:rgba(238,241,251,0.65);}
.page-title{font-family:var(--font-display);font-size:18px;font-weight:700;letter-spacing:.5px;}
.global-search{flex:1;max-width:420px;position:relative;}
.global-search input{width:100%;padding:10px 14px 10px 38px;border-radius:12px;border:1px solid var(--glass-border);
  background:var(--glass);font-size:13.5px;}
.global-search i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:13px;}
.global-search .kbd{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--text-dim);
  border:1px solid var(--glass-border);border-radius:5px;padding:1px 6px;font-family:var(--font-mono);}
#search-results{position:absolute;top:calc(100% + 8px);left:0;right:0;max-height:340px;overflow:auto;padding:8px;z-index:50;}
.search-hit{padding:9px 10px;border-radius:9px;display:flex;justify-content:space-between;font-size:13px;cursor:pointer;}
.search-hit:hover{background:var(--glass-hi);}
.search-hit small{color:var(--text-dim);}
.topbar-actions{display:flex;align-items:center;gap:10px;margin-left:auto;}
.clock-widget{font-family:var(--font-mono);font-size:12.5px;color:var(--text-dim);text-align:right;line-height:1.3;}
.clock-widget b{color:var(--text);font-size:14px;}
.icon-btn{position:relative;width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;
  color:var(--text-dim);transition:all .2s;}
.icon-btn:hover{background:var(--glass);color:var(--text);transform:translateY(-2px);}
.icon-btn .dot{position:absolute;top:6px;right:6px;width:8px;height:8px;border-radius:50%;background:var(--danger);
  box-shadow:0 0 8px var(--danger);animation:pulse-dot 1.6s infinite;}
@keyframes pulse-dot{0%,100%{transform:scale(1);}50%{transform:scale(1.3);}}
.avatar{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--purple),var(--cyan));
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;}

#content{padding:24px 26px 60px;flex:1;}
.view{animation:reveal .5s ease both;}
@keyframes reveal{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}

/* stat cards */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px;}
.stat-card{padding:20px;position:relative;overflow:hidden;transition:transform .25s ease, box-shadow .25s ease;cursor:default;}
.stat-card:hover{transform:translateY(-4px) rotate(-.3deg);box-shadow:0 14px 40px rgba(0,0,0,0.35);}
.stat-top{display:flex;justify-content:space-between;align-items:flex-start;}
.stat-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:17px;}
.stat-label{color:var(--text-dim);font-size:12.5px;margin-top:14px;font-weight:600;}
.stat-value{font-family:var(--font-display);font-size:28px;font-weight:700;margin-top:4px;}
.stat-trend{font-size:11.5px;margin-top:6px;font-weight:700;}
.trend-up{color:var(--success);} .trend-down{color:var(--danger);}
.stat-glow{position:absolute;width:120px;height:120px;border-radius:50%;filter:blur(40px);opacity:.35;top:-30px;right:-30px;}

.grid-2{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.panel{padding:20px;}
.panel-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.panel-title{font-weight:800;font-size:14.5px;letter-spacing:.2px;}
.panel-title i{color:var(--cyan);margin-right:8px;}

/* table */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;color:var(--text-dim);font-weight:700;font-size:11px;letter-spacing:.4px;text-transform:uppercase;
  padding:10px 12px;border-bottom:1px solid var(--glass-border);cursor:pointer;white-space:nowrap;user-select:none;}
th:hover{color:var(--text);}
th .fa-sort{opacity:.4;margin-left:4px;font-size:9px;}
td{padding:11px 12px;border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:middle;white-space:nowrap;}
tr.row-hover:hover{background:var(--glass);}
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.pill::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;}
.pill-new{background:rgba(0,229,255,0.14);color:var(--cyan);}
.pill-contacted{background:rgba(255,213,79,0.14);color:var(--golden);}
.pill-qualified{background:rgba(124,77,255,0.16);color:#B39CFF;}
.pill-proposal{background:rgba(255,140,0,0.16);color:var(--solar-orange);}
.pill-negotiation{background:rgba(255,181,71,0.16);color:var(--warn);}
.pill-won{background:rgba(49,216,164,0.16);color:var(--success);}
.pill-lost{background:rgba(255,92,122,0.16);color:var(--danger);}
.pri-high{color:var(--danger);font-weight:800;}
.pri-medium{color:var(--warn);font-weight:800;}
.pri-low{color:var(--text-dim);font-weight:700;}
.row-actions{display:flex;gap:6px;}
.toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px;}
.toolbar .field{margin:0;min-width:170px;flex:1;}
.toolbar-spacer{flex:1;}
.chip-filter{display:flex;gap:8px;flex-wrap:wrap;}
.chip{padding:7px 13px;border-radius:20px;font-size:12px;font-weight:700;border:1px solid var(--glass-border);color:var(--text-dim);}
.chip.active{background:linear-gradient(90deg,var(--solar-orange),var(--golden));color:#20140A;border-color:transparent;}
.empty-state{text-align:center;padding:50px 20px;color:var(--text-dim);}
.empty-state i{font-size:32px;margin-bottom:12px;display:block;opacity:.5;}

/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(2,4,12,0.6);backdrop-filter:blur(6px);z-index:200;
  display:flex;align-items:center;justify-content:center;padding:20px;animation:fade-in .2s ease;}
@keyframes fade-in{from{opacity:0;}to{opacity:1;}}
.modal-box{width:520px;max-width:100%;max-height:88vh;overflow-y:auto;padding:26px;animation:card-in .35s ease;}
.modal-box.wide{width:720px;}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.modal-title{font-weight:800;font-size:16px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 14px;}
.form-grid .full{grid-column:1/-1;}
.modal-foot{display:flex;justify-content:flex-end;gap:10px;margin-top:6px;}

/* kanban */
.kanban{display:flex;gap:14px;overflow-x:auto;padding-bottom:10px;}
.kanban-col{min-width:250px;flex-shrink:0;padding:14px;display:flex;flex-direction:column;gap:10px;min-height:200px;}
.kanban-col-head{display:flex;justify-content:space-between;align-items:center;font-weight:800;font-size:12.5px;
  text-transform:uppercase;letter-spacing:.4px;color:var(--text-dim);padding-bottom:6px;}
.kanban-col-head span{background:var(--glass);border-radius:20px;padding:1px 9px;font-size:11px;}
.kanban-col.drag-over{outline:2px dashed var(--cyan);outline-offset:-4px;background:rgba(0,229,255,0.05);}
.kcard{padding:12px;border-radius:13px;cursor:grab;transition:transform .18s ease, box-shadow .18s ease;}
.kcard:hover{transform:translateY(-3px);box-shadow:0 10px 26px rgba(0,0,0,.35);}
.kcard.dragging{opacity:.4;}
.kcard-name{font-weight:700;font-size:13.5px;margin-bottom:3px;}
.kcard-meta{font-size:11.5px;color:var(--text-dim);display:flex;justify-content:space-between;margin-top:8px;}

/* calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.cal-dow{text-align:center;font-size:11px;color:var(--text-dim);font-weight:700;padding-bottom:6px;}
.cal-cell{min-height:82px;border-radius:11px;padding:6px;border:1px solid var(--glass-border);background:var(--glass);
  font-size:11.5px;cursor:pointer;transition:background .2s;position:relative;}
.cal-cell:hover{background:var(--glass-hi);}
.cal-cell.today{border-color:var(--cyan);box-shadow:0 0 0 1px var(--cyan) inset;}
.cal-cell.other-month{opacity:.32;}
.cal-daynum{font-weight:800;}
.cal-event{margin-top:4px;padding:2px 5px;border-radius:6px;font-size:10px;font-weight:700;background:rgba(255,140,0,0.18);
  color:var(--golden);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cal-nav{display:flex;align-items:center;gap:10px;}

/* progress ring / bar */
.ring-wrap{position:relative;width:70px;height:70px;}
.ring-wrap svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--glass-border);stroke-width:7;}
.ring-fg{fill:none;stroke-width:7;stroke-linecap:round;transition:stroke-dashoffset 1s ease;}
.ring-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;}
.progress-bar{height:8px;border-radius:6px;background:var(--glass-border);overflow:hidden;}
.progress-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--solar-orange),var(--golden));
  transition:width 1s ease;}

/* toasts */
#toast-stack{position:fixed;bottom:22px;right:22px;display:flex;flex-direction:column;gap:10px;z-index:400;width:320px;max-width:90vw;}
.toast{padding:14px 16px;border-radius:13px;display:flex;gap:10px;align-items:flex-start;animation:toast-in .35s ease;
  box-shadow:0 10px 30px rgba(0,0,0,.4);}
@keyframes toast-in{from{opacity:0;transform:translateX(40px);}to{opacity:1;transform:none;}}
.toast i{margin-top:2px;}
.toast-title{font-weight:800;font-size:13px;}
.toast-msg{font-size:12px;color:var(--text-dim);margin-top:2px;}
.toast.success i{color:var(--success);} .toast.error i{color:var(--danger);}

/* notif panel */

@keyframes float-fab{0%,50%,100%{transform:translateY(0);}25%{transform:translateY(-8px);}}
#ai-panel{position:fixed;bottom:96px;right:26px;width:340px;height:460px;z-index:150;display:flex;flex-direction:column;overflow:hidden;}
.ai-head{padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--glass-border);}
.ai-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;}
.ai-msg{max-width:85%;padding:10px 13px;border-radius:14px;font-size:12.8px;line-height:1.45;}
.ai-msg.bot{background:var(--glass-hi);align-self:flex-start;border-bottom-left-radius:4px;}
.ai-msg.user{background:linear-gradient(90deg,var(--solar-orange),var(--golden));color:#20140A;align-self:flex-end;border-bottom-right-radius:4px;font-weight:600;}
.ai-typing{display:flex;gap:4px;padding:10px 13px;}
.ai-typing span{width:6px;height:6px;border-radius:50%;background:var(--text-dim);animation:typing 1.2s infinite;}
.ai-typing span:nth-child(2){animation-delay:.2s;} .ai-typing span:nth-child(3){animation-delay:.4s;}
@keyframes typing{0%,60%,100%{opacity:.3;transform:translateY(0);}30%{opacity:1;transform:translateY(-3px);}}
.ai-input{display:flex;gap:8px;padding:12px;border-top:1px solid var(--glass-border);}
.ai-input input{flex:1;padding:9px 12px;border-radius:20px;border:1px solid var(--glass-border);background:var(--glass);font-size:12.5px;}

/* skeleton */
.skel{background:linear-gradient(90deg,var(--glass) 25%,var(--glass-hi) 50%,var(--glass) 75%);background-size:200% 100%;
  animation:skel-move 1.4s infinite;border-radius:10px;}
@keyframes skel-move{from{background-position:200% 0;}to{background-position:-200% 0;}}

.text-dim{color:var(--text-dim);}

<script>
/* ============ SOLARIS CRM — APP CORE ============ */
/* SECTION: UTIL */
const $ = (sel,root=document)=>root.querySelector(sel);
const $$ = (sel,root=document)=>[...root.querySelectorAll(sel)];
const uid = (p='id')=>p+'_'+Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-4);
const escapeHtml = s => (s===undefined||s===null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmtMoney = n => '₹'+Number(n||0).toLocaleString('en-IN',{maximumFractionDigits:0});
const fmtDate = d => { if(!d) return '—'; const dt=new Date(d); if(isNaN(dt)) return d; return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); };
const daysUntil = d => { const now=new Date(); now.setHours(0,0,0,0); const t=new Date(d); t.setHours(0,0,0,0); return Math.round((t-now)/86400000); };
const initials = name => (name||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
function debounce(fn,ms){let t;return (...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);};}
function animateCounter(el,to,duration=1200,prefix='',suffix=''){
  const from=0; const start=performance.now();
  function step(now){
    const p=Math.min(1,(now-start)/duration);
    const eased=1-Math.pow(1-p,3);
    const val=Math.round(from+(to-from)*eased);
    el.textContent=prefix+val.toLocaleString('en-IN')+suffix;
    if(p<1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
function addRipple(e,btn){
  const rect=btn.getBoundingClientRect();
  const r=document.createElement('span');
  const size=Math.max(rect.width,rect.height);
  r.className='ripple';
  r.style.width=r.style.height=size+'px';
  r.style.left=(e.clientX-rect.left-size/2)+'px';
  r.style.top=(e.clientY-rect.top-size/2)+'px';
  btn.appendChild(r);
  setTimeout(()=>r.remove(),650);
}
document.addEventListener('click',e=>{
  const btn=e.target.closest('.btn,.icon-btn,.btn-icon,.chip,#ai-fab');
  if(btn){ btn.style.position=btn.style.position||'relative'; btn.style.overflow='hidden'; addRipple(e,btn); }
});
function playBeep(freq=880,dur=0.08){
  if(!DB.settings.sound) return;
  try{
    const ctx = window.__actx || (window.__actx=new (window.AudioContext||window.webkitAudioContext)());
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.type='sine'; o.frequency.value=freq; g.gain.value=0.05;
    o.connect(g); g.connect(ctx.destination); o.start();
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+dur);
    o.stop(ctx.currentTime+dur+0.02);
  }catch(e){}
}
/* SECTION: DB / STORE */
const DB_KEY='solaris_crm_db_v1';
let DB = null;
function loadDB(){
  try{
    const raw=localStorage.getItem(DB_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){ console.warn('DB load failed',e); }
  return null;
}
function saveDB(){
  try{ localStorage.setItem(DB_KEY, JSON.stringify(DB)); }catch(e){ console.warn('DB save failed',e); }
}
function resetDB(){
  localStorage.removeItem(DB_KEY);
  DB = seedDB();
  saveDB();
}
/* SECTION: SEED DATA */
const PIPELINE_STAGES = ['New Lead','Contacted','Qualified','Proposal Sent','Negotiation','Won','Lost'];
const LEAD_SOURCES = ['Website','Referral','LinkedIn','Cold Call','Trade Show','Google Ads','Instagram'];
const SALES_PEOPLE = ['Aarav Mehta','Priya Nair','Rohan Kapoor','Diya Sharma','Kabir Singh'];
const COMPANY_NAMES = ['Nimbus Retail','Orbit Logistics','Vertex Foods','Solstice Media','Quantum Textiles',
  'Bluepeak Software','Terra Realty','Nova Pharma','Crestline Hotels','Ironwave Motors','Pinnacle Finserv',

const FIRST=['Aditya','Meera','Kunal','Ishaan','Ananya','Vikram','Sneha','Rajat','Pooja','Arjun','Neha','Sameer','Tara','Yash','Riya','Dev'];
const LAST=['Sharma','Verma','Iyer','Kapoor','Reddy','Malhotra','Chopra','Bose','Nair','Rao','Gupta','Joshi'];
function rand(arr){return arr[Math.floor(Math.random()*arr.length)];}
function randInt(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function randDateWithin(daysBack,daysFwd){
  const d=new Date(); d.setDate(d.getDate()+randInt(-daysBack,daysFwd)); return d.toISOString().slice(0,10);
}
function seedLeads(n=42){
  const leads=[];
  for(let i=0;i<n;i++){
    const name=rand(FIRST)+' '+rand(LAST);
    const status=rand(PIPELINE_STAGES.slice(0, Math.random()<0.15?7:5)); // bias toward earlier stages, some won/lost

    leads.push({
      id:uid('lead'),
      name, company:rand(COMPANY_NAMES),
      phone:'+91 '+randInt(70000,99999)+randInt(10000,99999),
      email:name.toLowerCase().replace(' ','.')+'@'+rand(['gmail.com','outlook.com','corpmail.in']),
      source:rand(LEAD_SOURCES),
      status,
      priority,
      value: randInt(15000,850000),
      assigned: rand(SALES_PEOPLE),
      nextFollowUp: randDateWithin(6, 12),
      notes: 'Initial discovery conversation completed. Interested in a demo of the automation suite.',
      score: randInt(35,98),
      createdAt: randDateWithin(60,0)
    });
  }
  return leads;
}
function seedTasks(n=14){

function seedEvents(){

function seedDB(){

  };

/* SECTION: BACKGROUND FX */
function initStarfield(){
  const canvas=$('#starcanvas'); const ctx=canvas.getContext('2d');
  let w,h,stars=[];
  function resize(){
    w=canvas.width=window.innerWidth; h=canvas.height=window.innerHeight;
    const count=Math.floor((w*h)/9000);
    stars=Array.from({length:count},()=>({
      x:Math.random()*w, y:Math.random()*h, r:Math.random()*1.4+0.2,
      tw:Math.random()*Math.PI*2, sp:Math.random()*0.02+0.005
    }));
  }
  let mx=0,my=0;
  window.addEventListener('mousemove',e=>{
    mx=(e.clientX/window.innerWidth-0.5); my=(e.clientY/window.innerHeight-0.5);
    const glow=$('#cursor-glow');
    glow.style.left=e.clientX+'px'; glow.style.top=e.clientY+'px';
  });
  function draw(t){
    ctx.clearRect(0,0,w,h);
    for(const s of stars){
      const a=0.5+0.5*Math.sin(t*s.sp+s.tw);
      ctx.beginPath();
      ctx.fillStyle=`rgba(234,240,255,${0.25+a*0.55})`;
      ctx.arc(s.x+mx*10, s.y+my*10, s.r, 0, Math.PI*2);
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  resize();
  window.addEventListener('resize',resize);
  requestAnimationFrame(draw);
}
function initSolarSystem(){
  const layer=$('#bg-layer');
  const sun=document.createElement('div');
  sun.className='sun';
  sun.style.width='120px'; sun.style.height='120px';
  sun.style.top='-40px'; sun.style.right='-40px';
  layer.appendChild(sun);
  const planetDefs=[
    {size:340,speed:38,pw:10,color:'var(--cyan)'},
    {size:520,speed:60,pw:14,color:'var(--purple)'},
    {size:700,speed:85,pw:8,color:'var(--golden)'}
  ];
  planetDefs.forEach((p,i)=>{
    const orbit=document.createElement('div');
    orbit.className='orbit orbit-spin';
    orbit.style.width=p.size+'px'; orbit.style.height=p.size+'px';
    orbit.style.top='calc(-40px + 60px)'; orbit.style.right='calc(-40px + 60px)';
    orbit.style.transform='translate(50%,-50%)';
    orbit.style.right='-40px'; orbit.style.top='-40px';
    orbit.style.marginTop=(-p.size/2+60)+'px'; orbit.style.marginRight=(-p.size/2+60)+'px';
    orbit.style.animationDuration=p.speed+'s';
    orbit.style.position='absolute';
    const planet=document.createElement('div');
    planet.className='planet';
    planet.style.width=planet.style.height=p.pw+'px';
    planet.style.background=`radial-gradient(circle at 30% 30%, #fff, ${p.color})`;
    planet.style.boxShadow=`0 0 12px ${p.color}`;
    orbit.appendChild(planet);
    layer.appendChild(orbit);
  });
}
/* subtle 3D tilt on stat/kanban cards */
function initTilt(){
  document.addEventListener('mousemove', e=>{
    const card=e.target.closest('.stat-card, .kcard');
    if(!card) return;
    const r=card.getBoundingClientRect();
    const px=(e.clientX-r.left)/r.width-0.5, py=(e.clientY-r.top)/r.height-0.5;
    card.style.transform=`perspective(600px) rotateX(${(-py*6).toFixed(2)}deg) rotateY(${(px*6).toFixed(2)}deg) translateY(-2px)`;
  });
  document.addEventListener('mouseout', e=>{
    const card=e.target.closest('.stat-card, .kcard');
    if(card) card.style.transform='';
  });
}
/* SECTION: TOASTS */
function ensureToastStack(){
  let s=$('#toast-stack');
  if(!s){ s=document.createElement('div'); s.id='toast-stack'; document.body.appendChild(s); }
  return s;
}
function toast(title,msg,type='info',opts={}){
  const stack=ensureToastStack();
  const icon={success:'fa-circle-check',error:'fa-circle-exclamation',info:'fa-circle-info',warn:'fa-triangle-exclamation'}[type]||'fa-circle-info';
  const el=document.createElement('div');
  el.className='toast glass '+type;
  el.innerHTML=`<i class="fa-solid ${icon}"></i><div style="flex:1"><div class="toast-title">${escapeHtml(title)}</div>
    <div class="toast-msg">${escapeHtml(msg||'')}</div>
    ${opts.undo?`<button class="btn btn-sm btn-ghost mt-8" id="undo-${opts.id}"><i class="fa-solid fa-rotate-left"></i> Undo</button>`:''}
    </div>
    <button class="icon-btn" style="width:26px;height:26px" onclick="this.closest('.toast').remove()"><i class="fa-solid fa-xmark"></i></button>`;
  stack.appendChild(el);
  playBeep(type==='error'?300:880, 0.07);
  if(opts.undo){
    $('#undo-'+opts.id, el).onclick=()=>{ opts.undo(); el.remove(); };
  }
  const life=opts.life||4200;
  setTimeout(()=>{ el.style.transition='opacity .3s, transform .3s'; el.style.opacity='0'; el.style.transform='translateX(40px)'; setTimeout(()=>el.remove(),300); }, life);
}
/* SECTION: MODAL */
function openModal(title, bodyHtml, {wide=false, footHtml=''} = {}){
  closeModal();
  const ov=document.createElement('div');
  ov.className='modal-overlay'; ov.id='active-modal';
  ov.innerHTML=`<div class="modal-box glass ${wide?'wide':''}">
    <div class="modal-head"><div class="modal-title">${escapeHtml(title)}</div>
      <button class="icon-btn" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button></div>
    <div class="modal-body">${bodyHtml}</div>
    ${footHtml?`<div class="modal-foot">${footHtml}</div>`:''}
  </div>`;
  ov.addEventListener('mousedown',e=>{ if(e.target===ov) closeModal(); });
  document.body.appendChild(ov);
  return ov;
}
function closeModal(){ const m=$('#active-modal'); if(m) m.remove(); }
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });
/* SECTION: ROUTER */

  leads:{ label:'Leads', icon:'fa-user-plus', render:renderLeads },

  reports:{ label:'Reports', icon:'fa-chart-pie', render:renderReports },
  notifications:{ label:'Notifications', icon:'fa-envelope-open-text', render:renderNotificationsPage },
  settings:{ label:'Settings', icon:'fa-gear', render:renderSettings }
};
function currentRoute(){
  const h=(location.hash||'#dashboard').replace('#','');
  return ROUTES[h] ? h : 'dashboard';
}
function navigate(route){
  location.hash='#'+route;
}
window.addEventListener('hashchange',()=>{ if(checkLoggedIn()) renderShellAndView(); });
/* SECTION: LOGIN */
const AUTH_KEY='solaris_auth_v1';
const EMAIL_RE=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;
function findUser(email){ return (DB.users||[]).find(u=>u.email===String(email||'').trim().toLowerCase()); }
function doLogin(userId, remember){
  const payload=JSON.stringify({userId, ts:Date.now()});
  if(remember) localStorage.setItem(AUTH_KEY,payload);
  else sessionStorage.setItem(AUTH_KEY,payload);
  const user=findUserById(userId);
  if(user){ DB.settings.name=user.name; saveDB(); }
}
function doLogout(){
  localStorage.removeItem(AUTH_KEY); sessionStorage.removeItem(AUTH_KEY);
  location.hash=''; renderRoot();
}
function getSessionPayload(){
  try{
    const raw = localStorage.getItem(AUTH_KEY) || sessionStorage.getItem(AUTH_KEY);
    return raw ? JSON.parse(raw) : null;
  }catch(e){ return null; }
}
function checkLoggedIn(){
  const p=getSessionPayload();
  return !!(p && p.userId && findUserById(p.userId));
}
function findUserById(id){ return (DB.users||[]).find(u=>u.id===id); }
function currentUser(){
  const p=getSessionPayload();
  return p ? findUserById(p.userId) : null;
}
function shakeEl(el){
  el.classList.remove('shake'); void el.offsetWidth; el.classList.add('shake');
}
function showAuthError(msg){
  const box=$('#auth-error');
  if(!box) return;
  box.textContent=msg; box.classList.remove('hidden');
  shakeEl($('.login-card'));
  playBeep(220,0.12);
}
function hideAuthError(){ const box=$('#auth-error'); if(box) box.classList.add('hidden'); }

function renderLogin(mode='login'){
  const root=$('#root');
  root.innerHTML=`
  <div id="login-screen">
    <div class="login-card glass">
      <div class="login-logo">SOLARIS CRM</div>
      <div class="login-sub">${
        mode==='login'?'Sign in to your automation cockpit':
        mode==='register'?'Create your commander account':
        mode==='forgot-email'?'Reset your password':
        'Choose a new password'}</div>
      <div id="auth-error" class="hidden" style="background:rgba(255,92,122,0.12);border:1px solid rgba(255,92,122,0.35);
        color:var(--danger);font-size:12.5px;font-weight:600;padding:10px 12px;border-radius:10px;margin-bottom:14px;text-align:left;"></div>

      <form id="auth-form" autocomplete="off" novalidate>
        ${mode==='register'?`
        <div class="field"><label>Full name</label><input type="text" id="reg-name" placeholder="Alex Rivera" required></div>
        <div class="field"><label>Email address</label><input type="email" id="auth-email" placeholder="you@company.com" required></div>
        <div class="field"><label>Password</label><input type="password" id="auth-pass" placeholder="Minimum 6 characters" required></div>
        <div class="field"><label>Confirm password</label><input type="password" id="auth-pass-confirm" placeholder="Re-enter password" required></div>
        `:''}
        ${mode==='login'?`

      const pass=$('#auth-pass').value;
      const confirm=$('#auth-pass-confirm').value;
      if(!name){ showAuthError('Please enter your full name.'); return; }
      if(!EMAIL_RE.test(email)){ showAuthError('Invalid email address.'); return; }
      if(findUser(email)){ showAuthError('An account with this email already exists.'); return; }
      if(pass.length<6){ showAuthError('Password must be at least 6 characters.'); return; }
      if(pass!==confirm){ showAuthError('Passwords do not match.'); return; }
      const user={id:uid('user'), name, email, password:pass, createdAt:new Date().toISOString()};
      DB.users.push(user); saveDB();
      doLogin(user.id, true);
      toast('Account created','Welcome to Solaris CRM, '+name+'!','success');
      location.hash='#dashboard'; renderRoot();
      return;
    }

    if(mode==='login'){
      const email=$('#auth-email').value.trim().toLowerCase();
      const pass=$('#auth-pass').value;
      if(!EMAIL_RE.test(email)){ showAuthError('Invalid email address.'); return; }
      const user=findUser(email);
      if(!user){ showAuthError('Account not found. Please register first.'); return; }
      if(user.password!==pass){ showAuthError('Incorrect password.'); return; }
      doLogin(user.id, $('#remember-me').checked);
      toast('Welcome back', 'Logged in as '+user.name,'success');
      location.hash='#dashboard'; renderRoot();
      return;
    }

    if(mode==='forgot-email'){
      const email=$('#auth-email').value.trim().toLowerCase();
      if(!EMAIL_RE.test(email)){ showAuthError('Invalid email address.'); return; }
      const user=findUser(email);

      window.__resetEmail=email;
      toast('Account found', 'Set a new password for '+user.name,'info');
      renderLogin('forgot-reset');
      return;
    }

    if(mode==='forgot-reset'){
      const pass=$('#new-pass').value, confirm=$('#new-pass-confirm').value;
      if(pass.length<6){ showAuthError('Password must be at least 6 characters.'); return; }
      if(pass!==confirm){ showAuthError('Passwords do not match.'); return; }
      const user=findUser(window.__resetEmail);
      if(!user){ showAuthError('Something went wrong — please try again.'); renderLogin('forgot-email'); return; }
      user.password=pass; saveDB();
      toast('Password updated','You can now log in with your new password.','success');
      renderLogin('login');
      return;
    }
  });

  if(mode==='login'){

  const leads=DB.leads;
  const total=leads.length;
  const newLeads=leads.filter(l=>l.status==='New Lead').length;
  const contacted=leads.filter(l=>l.status==='Contacted').length;
  const dueToday=leads.filter(l=>daysUntil(l.nextFollowUp)<=0 && !['Won','Lost'].includes(l.status)).length;
  const won=leads.filter(l=>l.status==='Won');
  const lost=leads.filter(l=>l.status==='Lost').length;
  const revenue=won.reduce((s,l)=>s+l.value,0);
  return {total,newLeads,contacted,dueToday,converted:won.length,lost,revenue};
}

function loadWeather(){
  const el=$('#weather-widget'); if(!el) return;
  const fallback=()=>{ el.innerHTML=`<div style="font-size:22px;font-weight:800;">28°C <i class="fa-solid fa-cloud-sun" style="color:var(--golden)"></i></div><div class="mt-8">Partly cloudy · Bhubaneswar</div>`; };
  if(!navigator.geolocation){ fallback(); return; }
  navigator.geolocation.getCurrentPosition(async pos=>{
    try{
      const {latitude,longitude}=pos.coords;
      const res=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`);
      const data=await res.json();
      const cw=data.current_weather;
      el.innerHTML=`<div style="font-size:22px;font-weight:800;">${Math.round(cw.temperature)}°C <i class="fa-solid fa-cloud-sun" style="color:var(--golden)"></i></div>
        <div class="mt-8">Wind ${Math.round(cw.windspeed)} km/h · Live location</div>`;

  }, ()=>fallback(), {timeout:4000});

function thSort(key,label){
  const active=leadsState.sortKey===key;
  return `<th data-key="${key}" onclick="setLeadSort('${key}')">${label} <i class="fa-solid ${active?(leadsState.sortDir===1?'fa-sort-up':'fa-sort-down'):'fa-sort'}"></i></th>`;
}
function setLeadSort(key){
  if(leadsState.sortKey===key) leadsState.sortDir*=-1; else { leadsState.sortKey=key; leadsState.sortDir=1; }
  renderLeads($('#view-leads'));
}
function filteredLeads(){
  let arr=DB.leads.filter(l=>{
    const q=leadsState.q.toLowerCase();
    const matchQ=!q || [l.name,l.company,l.email,l.phone].some(f=>(f||'').toLowerCase().includes(q));
    const matchStatus=leadsState.status==='All'||l.status===leadsState.status;
    return matchQ && matchStatus;
  });
  arr.sort((a,b)=>{
    let av=a[leadsState.sortKey], bv=b[leadsState.sortKey];
    if(typeof av==='number') return (av-bv)*leadsState.sortDir;
    return String(av).localeCompare(String(bv))*leadsState.sortDir;
  });
  return arr;
}
function pagedLeads(){
  const all=filteredLeads();
  const totalPages=Math.max(1,Math.ceil(all.length/leadsState.pageSize));
  if(leadsState.page>totalPages) leadsState.page=totalPages;
  const start=(leadsState.page-1)*leadsState.pageSize;
  return all.slice(start,start+leadsState.pageSize);
}

function exportLeadsCSV(){
  const headers=['Lead ID','Name','Company','Phone','Email','Source','Status','Priority','Value','Assigned Salesperson','Next Follow-up Date','Notes'];
  const rows=DB.leads.map(l=>[l.id,l.name,l.company,l.phone,l.email,l.source,l.status,l.priority,l.value,l.assigned,l.nextFollowUp,l.notes]);
  const csv=[headers,...rows].map(r=>r.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='solaris-leads.csv'; a.click();
  toast('Export complete','Leads exported to CSV.','success');
}
function importLeadsCSV(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const text=ev.target.result;
      const lines=text.split(/\r?\n/).filter(Boolean);
      const headers=parseCSVLine(lines[0]);
      let count=0;
      for(let i=1;i<lines.length;i++){
        const cols=parseCSVLine(lines[i]);
        if(cols.length<2) continue;
        const rec={}; headers.forEach((h,idx)=>rec[h]=cols[idx]);
        DB.leads.unshift({
          id:uid('lead'), name:rec['Name']||'Unnamed', company:rec['Company']||'—', phone:rec['Phone']||'',
          email:rec['Email']||'', source:rec['Source']||'Website', status:PIPELINE_STAGES.includes(rec['Status'])?rec['Status']:'New Lead',
          priority:['High','Medium','Low'].includes(rec['Priority'])?rec['Priority']:'Medium',
          value:Number(rec['Value'])||0, assigned:rec['Assigned Salesperson']||SALES_PEOPLE[0],
          nextFollowUp:rec['Next Follow-up Date']||new Date().toISOString().slice(0,10), notes:rec['Notes']||'',
          score:randInt(40,95), createdAt:new Date().toISOString().slice(0,10)
        });
        count++;
      }
      saveDB(); renderLeads($('#view-leads'));
      toast('Import complete', count+' leads imported from CSV.','success');
    }catch(err){ toast('Import failed','Could not parse that CSV file.','error'); }
    e.target.value='';
  };
  reader.readAsText(file);
}
function parseCSVLine(line){
  const out=[]; let cur=''; let inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(inQ){
      if(c==='"' && line[i+1]==='"'){ cur+='"'; i++; }
      else if(c==='"'){ inQ=false; }
      else cur+=c;
    } else {
      if(c==='"') inQ=true;
      else if(c===','){ out.push(cur); cur=''; }
      else cur+=c;
    }
  }
  out.push(cur);
  return out;
}

function renderKanbanBoard(){
  const board=$('#kanban-board'); if(!board) return;
  board.innerHTML = PIPELINE_STAGES.map(stage=>{
    const items=DB.leads.filter(l=>l.status===stage);
    const total=items.reduce((s,l)=>s+l.value,0);
    return `<div class="kanban-col glass" data-stage="${stage}">
      <div class="kanban-col-head"><span>${stage}</span><span>${items.length}</span></div>
      <div class="text-dim" style="font-size:11px;margin-top:-4px;">${fmtMoney(total)}</div>

        </div>`).join('')}
      </div>
    </div>`;
  }).join('');
  $$('.kcard',board).forEach(card=>{
    card.addEventListener('dragstart',e=>{ card.classList.add('dragging'); e.dataTransfer.setData('text/plain',card.dataset.id); });
    card.addEventListener('dragend',()=>card.classList.remove('dragging'));
    card.addEventListener('click',()=>openLeadModal(card.dataset.id));
  });
  $$('.kanban-col',board).forEach(col=>{
    col.addEventListener('dragover',e=>{ e.preventDefault(); col.classList.add('drag-over'); });
    col.addEventListener('dragleave',()=>col.classList.remove('drag-over'));
    col.addEventListener('drop',e=>{
      e.preventDefault(); col.classList.remove('drag-over');
      const id=e.dataTransfer.getData('text/plain');
      const lead=DB.leads.find(l=>l.id===id);
      if(lead && lead.status!==col.dataset.stage){

        if(lead.status==='Won') pushNotification('Sales Achievement 🎉', lead.name+' just closed for '+fmtMoney(lead.value)+'!','fa-trophy');
        renderKanbanBoard();
      }
    });
  });
}

function snoozeFollowup(id){
  const l=DB.leads.find(x=>x.id===id); if(!l) return;
  const d=new Date(l.nextFollowUp); d.setDate(d.getDate()+2);
  l.nextFollowUp=d.toISOString().slice(0,10); saveDB();
  toast('Follow-up snoozed', l.name+' pushed to '+fmtDate(l.nextFollowUp),'info');
  renderFollowups($('#view-followups'));

function markFollowedUp(id){
  const l=DB.leads.find(x=>x.id===id); if(!l) return;
  const stages=PIPELINE_STAGES;
  const idx=stages.indexOf(l.status);
  if(idx<stages.length-3) l.status=stages[idx+1];
  const d=new Date(); d.setDate(d.getDate()+(l.recurring?7:5));
  l.nextFollowUp=d.toISOString().slice(0,10); saveDB();
  toast('Follow-up completed', l.name+' moved to '+l.status,'success');
  pushNotification('Follow-up completed', l.name+' — next step scheduled '+fmtDate(l.nextFollowUp), 'fa-check');
  renderFollowups($('#view-followups')); refreshNotifState();

function simulateReminders(kind){
  const due=DB.leads.filter(l=>!['Won','Lost'].includes(l.status) && daysUntil(l.nextFollowUp)<=1);
  if(!due.length){ toast('Nothing to send','No follow-ups due within 24 hours.','info'); return; }
  toast(kind==='email'?'Sending email reminders…':'Sending SMS reminders…', due.length+' reminder(s) queued','info');
  let i=0;
  const interval=setInterval(()=>{
    if(i>=due.length){ clearInterval(interval); return; }
    const l=due[i];
    toast(kind==='email'?'Email sent':'SMS sent', `Reminder delivered to ${l.assigned} about ${l.name}`, 'success', {life:2600});
    i++;
  }, 500);
}

let calState={ y:new Date().getFullYear(), m:new Date().getMonth() };
function renderCalendar(mount){
  mount.innerHTML=`

    </div>

    <div class="cal-grid mt-8" id="cal-cells"></div>
  </div>`;
  $('#cal-prev').addEventListener('click',()=>{ calState.m--; if(calState.m<0){calState.m=11;calState.y--;} renderCalendar(mount); });
  $('#cal-next').addEventListener('click',()=>{ calState.m++; if(calState.m>11){calState.m=0;calState.y++;} renderCalendar(mount); });
  $('#add-event-btn').addEventListener('click',()=>openEventModal());
  drawCalendarGrid();
}
function drawCalendarGrid(){
  const {y,m}=calState;
  $('#cal-title').textContent=new Date(y,m,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
  $('#cal-dow').innerHTML=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="cal-dow">${d}</div>`).join('');
  const first=new Date(y,m,1);
  const startOffset=first.getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const daysInPrev=new Date(y,m,0).getDate();
  const todayStr=new Date().toISOString().slice(0,10);
  let cells=[];
  for(let i=startOffset-1;i>=0;i--) cells.push({d:daysInPrev-i, other:true, dateStr:null});
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    cells.push({d, other:false, dateStr});
  }
  while(cells.length%7!==0) cells.push({d:cells.length, other:true, dateStr:null});
  $('#cal-cells').innerHTML=cells.map(c=>{
    const events=c.dateStr? DB.events.filter(e=>e.date===c.dateStr):[];
    const leadFollowups=c.dateStr? DB.leads.filter(l=>l.nextFollowUp===c.dateStr && !['Won','Lost'].includes(l.status)):[];
    return `<div class="cal-cell ${c.other?'other-month':''} ${c.dateStr===todayStr?'today':''}" ${c.dateStr?`onclick="openEventModal(null,'${c.dateStr}')"`:''}>
      <div class="cal-daynum">${c.d}</div>
      ${events.slice(0,2).map(e=>`<div class="cal-event">${escapeHtml(e.title)}</div>`).join('')}
      ${leadFollowups.slice(0,1).map(l=>`<div class="cal-event" style="background:rgba(0,229,255,0.16);color:var(--cyan);">Follow-up: ${escapeHtml(l.name)}</div>`).join('')}
    </div>`;
  }).join('');
}

function buildReportCharts(){

    canvasIds.forEach(id=>{ const el=$('#'+id); if(el) chartUnavailableFallback(el); });
    return;
  }
  try{
  const leads=DB.leads;
  ['__c1','__c2','__c3','__c4','__c5','__c6'].forEach(k=>{ if(window[k]) window[k].destroy(); });
  const bySource={}; leads.forEach(l=>bySource[l.source]=(bySource[l.source]||0)+1);
  window.__c1=new Chart($('#chart-sources'),{type:'doughnut',data:{labels:Object.keys(bySource),
    datasets:[{data:Object.values(bySource),backgroundColor:chartColors()}]},
    options:{plugins:{legend:{position:'bottom',labels:{color:'#9BA8CC',boxWidth:10,font:{size:10}}}}}});
  const won=leads.filter(l=>l.status==='Won').length, lost=leads.filter(l=>l.status==='Lost').length;
  const active=leads.length-won-lost;
  window.__c2=new Chart($('#chart-conversion'),{type:'pie',data:{labels:['Won','Lost','Active'],
    datasets:[{data:[won,lost,active],backgroundColor:['#31D8A4','#FF5C7A','#00E5FF']}]},
    options:{plugins:{legend:{position:'bottom',labels:{color:'#9BA8CC',boxWidth:10,font:{size:10}}}}}});
  const bySales={}; leads.filter(l=>l.status==='Won').forEach(l=>bySales[l.assigned]=(bySales[l.assigned]||0)+l.value);
  SALES_PEOPLE.forEach(s=>{ if(!(s in bySales)) bySales[s]=0; });
  window.__c3=new Chart($('#chart-salespeople'),{type:'bar',data:{labels:Object.keys(bySales),
    datasets:[{data:Object.values(bySales),backgroundColor:'#FF8C00',borderRadius:6}]},
    options:{indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#9BA8CC'},grid:{color:'rgba(255,255,255,.06)'}},y:{ticks:{color:'#9BA8CC',font:{size:10}},grid:{display:false}}}}});
  const months=[...Array(6)].map((_,i)=>{ const d=new Date(); d.setMonth(d.getMonth()-(5-i)); return d.toLocaleDateString('en-US',{month:'short'}); });
  const salesTrend=months.map(()=>randInt(400000,2200000));
  window.__c4=new Chart($('#chart-sales'),{type:'line',data:{labels:months,datasets:[{label:'Revenue',data:salesTrend,
    borderColor:'#00E5FF',backgroundColor:'rgba(0,229,255,0.15)',fill:true,tension:.4,pointRadius:3}]},

  const stagesShort=PIPELINE_STAGES;
  const highCounts=stagesShort.map(s=>leads.filter(l=>l.status===s&&l.priority==='High').length);
  const medCounts=stagesShort.map(s=>leads.filter(l=>l.status===s&&l.priority==='Medium').length);
  const lowCounts=stagesShort.map(s=>leads.filter(l=>l.status===s&&l.priority==='Low').length);
  window.__c6=new Chart($('#chart-radar'),{type:'radar',data:{labels:stagesShort,
    datasets:[

  }catch(err){
    console.warn('Report charts failed to render',err);
    canvasIds.forEach(id=>{ const el=$('#'+id); if(el && el.tagName==='CANVAS') chartUnavailableFallback(el); });

        <button class="btn btn-danger" id="confirm-reset-btn"><i class="fa-solid fa-trash"></i> Reset everything</button>`});
    $('#confirm-reset-btn').addEventListener('click',()=>{
      resetDB(); closeModal(); toast('Database reset','Fresh demo data has been loaded.','success'); renderRoot();
    });
  });
  $('#logout-btn').addEventListener('click',()=>{
    openModal('Log out?','<p style="font-size:13.5px;">You will need to sign in again to access Solaris CRM.</p>',
      {footHtml:`<button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-danger" id="confirm-logout-btn">Log out</button>`});
    $('#confirm-logout-btn').addEventListener('click',()=>{ closeModal(); doLogout(); });
  });
}
function applyTheme(){
  document.documentElement.classList.toggle('light', DB.settings.theme==='light');
}
/* SECTION: NOTIF ENGINE */
function pushNotification(title,msg,icon='fa-bell'){
  DB.notifications.unshift({id:uid('notif'),title,msg,icon,time:new Date().toISOString(),read:false});
  DB.notifications = DB.notifications.slice(0,60);
  saveDB();
}
function refreshNotifState(){
  const unread = (DB.notifications||[]).filter(n=>!n.read).length;
  const dot=$('#notif-dot'); if(dot) dot.classList.toggle('hidden', unread===0);
  const navBadge=$('#notif-nav-badge'); if(navBadge){ navBadge.textContent=unread; navBadge.classList.toggle('hidden', unread===0); }
  const dueCount = DB.leads.filter(l=>!['Won','Lost'].includes(l.status) && daysUntil(l.nextFollowUp)<=0).length;
  const fBadge=$('#followup-badge'); if(fBadge){ fBadge.textContent=dueCount; fBadge.classList.toggle('hidden', dueCount===0); }
}
function toggleNotifPanel(){
  const existing=$('#notif-panel-el');
  if(existing){ existing.remove(); return; }
  const panel=document.createElement('div');
  panel.id='notif-panel-el'; panel.className='notif-panel glass';
  const items=DB.notifications||[];
  panel.innerHTML = `<div class="flex justify-between items-center mb-16" style="padding:0 6px;">
      <b style="font-size:13px;">Notifications</b>
      <span class="link-btn" style="font-size:11.5px;" id="mark-all-read">Mark all read</span>
    </div>
    ${items.length? items.map(n=>`
    <div class="notif-item ${n.read?'':'unread'}" data-id="${n.id}">
      <div class="ni-icon" style="background:rgba(0,229,255,0.12);color:var(--cyan);"><i class="fa-solid ${n.icon}"></i></div>
      <div><div style="font-size:12.5px;font-weight:700;">${escapeHtml(n.title)}</div>
      <div class="text-dim" style="font-size:11.5px;">${escapeHtml(n.msg)}</div>
      <div class="notif-time">${new Date(n.time).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}</div></div>
    </div>`).join('') : `<div class="empty-state"><i class="fa-solid fa-bell-slash"></i>You're all caught up.</div>`}
  `;
  document.body.appendChild(panel);
  $$('.notif-item',panel).forEach(el=>el.addEventListener('click',()=>{
    const n=DB.notifications.find(x=>x.id===el.dataset.id); if(n){ n.read=true; saveDB(); refreshNotifState(); el.classList.remove('unread'); }
  }));
  const markAll=$('#mark-all-read',panel);
  if(markAll) markAll.addEventListener('click',()=>{ DB.notifications.forEach(n=>n.read=true); saveDB(); refreshNotifState(); toggleNotifPanel(); toggleNotifPanel(); });
  setTimeout(()=>{
    document.addEventListener('click', function handler(e){
      if(!panel.contains(e.target) && e.target.id!=='notif-btn' && !e.target.closest('#notif-btn')){
        panel.remove(); document.removeEventListener('click',handler);
      }
    });
  },10);
}
function closeNotifPanel(){ const p=$('#notif-panel-el'); if(p) p.remove(); }
function renderNotificationsPage(mount){
  const items=DB.notifications||[];
  mount.innerHTML=`<div class="panel glass">
    <div class="panel-head"><div class="panel-title"><i class="fa-solid fa-envelope-open-text"></i>All Notifications</div>
      <button class="btn btn-sm btn-ghost" id="clear-notifs-btn"><i class="fa-solid fa-trash"></i> Clear all</button></div>
    ${items.length? items.map(n=>`
    <div class="notif-item ${n.read?'':'unread'}" style="margin-bottom:8px;">
      <div class="ni-icon" style="background:rgba(0,229,255,0.12);color:var(--cyan);"><i class="fa-solid ${n.icon}"></i></div>
      <div><div style="font-size:13px;font-weight:700;">${escapeHtml(n.title)}</div>
      <div class="text-dim" style="font-size:12px;">${escapeHtml(n.msg)}</div>
      <div class="notif-time">${new Date(n.time).toLocaleString()}</div></div>
    </div>`).join('') : `<div class="empty-state"><i class="fa-solid fa-bell-slash"></i>No notifications yet. They'll appear here as things happen.</div>`}
  </div>`;
  $('#clear-notifs-btn').addEventListener('click',()=>{ DB.notifications=[]; saveDB(); renderNotificationsPage(mount); refreshNotifState(); toast('Notifications cleared','','info'); });
}
/* SECTION: AI ASSISTANT */
let aiOpen=false;
function mountAIAssistant(){
  if($('#ai-fab')) return;
  const fab=document.createElement('div'); fab.id='ai-fab'; fab.innerHTML='<i class="fa-solid fa-robot"></i>';
  fab.addEventListener('click',toggleAIPanel);
  document.body.appendChild(fab);
}
function toggleAIPanel(){
  aiOpen=!aiOpen;
  let panel=$('#ai-panel');
  if(!aiOpen){ if(panel) panel.remove(); return; }
  if(panel) return;
  panel=document.createElement('div'); panel.id='ai-panel'; panel.className='glass';
  panel.innerHTML=`
    <div class="ai-head"><div class="avatar" style="background:linear-gradient(135deg,var(--cyan),var(--purple));width:32px;height:32px;font-size:12px;">AI</div>
      <div><div style="font-weight:800;font-size:13px;">Solaris Assistant</div><div class="text-dim" style="font-size:10.5px;">Ask about leads, follow-ups, sales tips</div></div>
      <button class="icon-btn" style="margin-left:auto;" onclick="toggleAIPanel()"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="ai-body" id="ai-body">
      <div class="ai-msg bot">Hi! I'm your Solaris AI Assistant. Try asking: "follow-ups today", "top customer", "lead suggestions", or "sales tip".</div>
    </div>
    <div class="ai-input"><input id="ai-text-input" placeholder="Ask something…">
      <button class="btn btn-icon btn-primary" id="ai-send-btn"><i class="fa-solid fa-paper-plane"></i></button></div>`;
  document.body.appendChild(panel);
  const send=()=>{
    const input=$('#ai-text-input'); const val=input.value.trim(); if(!val) return;
    appendAIMsg(val,'user'); input.value='';
    showAITyping();
    setTimeout(()=>{ hideAITyping(); appendAIMsg(aiRespond(val),'bot'); },700+Math.random()*500);
  };
  $('#ai-send-btn').addEventListener('click',send);
  $('#ai-text-input').addEventListener('keydown',e=>{ if(e.key==='Enter') send(); });
}
function appendAIMsg(text,who){
  const body=$('#ai-body'); if(!body) return;
  const el=document.createElement('div'); el.className='ai-msg '+who; el.textContent=text;
  body.appendChild(el); body.scrollTop=body.scrollHeight;
}
function showAITyping(){
  const body=$('#ai-body'); if(!body) return;
  const el=document.createElement('div'); el.className='ai-typing glass-hi'; el.id='ai-typing-el';
  el.style.borderRadius='14px'; el.style.alignSelf='flex-start'; el.style.width='fit-content';
  el.innerHTML='<span></span><span></span><span></span>';
  body.appendChild(el); body.scrollTop=body.scrollHeight;
}
function hideAITyping(){ const el=$('#ai-typing-el'); if(el) el.remove(); }
function aiRespond(q){
  const s=q.toLowerCase();
  if(s.includes('follow')){
    const due=DB.leads.filter(l=>!['Won','Lost'].includes(l.status)&&daysUntil(l.nextFollowUp)<=0);
    return due.length ? `You have ${due.length} follow-up(s) due: ${due.slice(0,3).map(l=>l.name).join(', ')}${due.length>3?'…':''}.` : "You're all caught up — no follow-ups due today.";
  }
  if(s.includes('top customer')||s.includes('best customer')){
    const c=[...getCustomers()].sort((a,b)=>b.value-a.value)[0];
    return c ? `Your top customer is ${c.name} from ${c.company}, worth ${fmtMoney(c.value)}.` : "No won customers yet — close a deal to see this here.";
  }
  if(s.includes('lead suggestion')||s.includes('suggest')){
    const cand=[...DB.leads].filter(l=>!['Won','Lost'].includes(l.status)).sort((a,b)=>b.score-a.score)[0];
    return cand ? `Focus on ${cand.name} (${cand.company}) — highest lead score at ${cand.score}/100.` : 'No active leads to suggest right now.';
  }
  if(s.includes('sales tip')||s.includes('tip')){
    return rand(['Personalize your first follow-up message — response rates jump significantly.',
      'Call within 5 minutes of a new lead coming in for the best conversion odds.',
      'Send a short recap email after every discovery call to stay top of mind.',
      'Qualify budget and timeline early to avoid stalled deals later.']);
  }
  if(s.includes('reply template')||s.includes('template')||s.includes('auto-reply')){
    return `Try: "Hi {name}, thanks for reaching out! I'd love to learn more about ${'{company}'}'s goals — are you free for a quick call this week?"`;
  }
  if(s.includes('revenue')||s.includes('target')){
    const st=computeStats();
    return `Current revenue is ${fmtMoney(st.revenue)} toward a ${fmtMoney(DB.monthlyTarget)} target (${Math.round(st.revenue/DB.monthlyTarget*100)}%).`;
  }
  if(s.includes('hello')||s.includes('hi')) return 'Hello! How can I help with your pipeline today?';
  return "I can help with follow-ups, lead suggestions, customer info, and sales tips — try asking about one of those.";
}
/* SECTION: GLOBAL SEARCH */
function initGlobalSearch(){
  const input=$('#global-search-input'); if(!input) return;
  const results=$('#search-results');
  input.addEventListener('input', debounce(()=>{
    const q=input.value.trim().toLowerCase();
    if(!q){ results.classList.add('hidden'); return; }
    const hits=[];
    DB.leads.forEach(l=>{ if([l.name,l.company,l.email,l.phone].some(f=>(f||'').toLowerCase().includes(q)))
      hits.push({type: l.status==='Won'?'Customer':'Lead', label:l.name, sub:l.company, action:()=>{ navigate(l.status==='Won'?'customers':'leads'); setTimeout(()=>{ if(l.status!=='Won') openLeadModal(l.id); else openCustomerProfile(l.id); },80);} }); });
    DB.tasks.forEach(t=>{ if(t.title.toLowerCase().includes(q)) hits.push({type:'Task', label:t.title, sub:t.assigned, action:()=>navigate('tasks')}); });
    DB.events.forEach(ev=>{ if(ev.title.toLowerCase().includes(q)) hits.push({type:'Calendar', label:ev.title, sub:fmtDate(ev.date), action:()=>navigate('calendar')}); });
    PIPELINE_STAGES.forEach(st=>{ if(st.toLowerCase().includes(q)) hits.push({type:'Pipeline', label:st+' stage', sub:DB.leads.filter(l=>l.status===st).length+' leads', action:()=>navigate('pipeline')}); });
    if('invoice'.includes(q)||'invoices'.includes(q)){
      getCustomers().forEach(c=>hits.push({type:'Invoice', label:c.name+' — invoices', sub:c.company, action:()=>{ navigate('customers'); setTimeout(()=>openCustomerProfile(c.id),80); } }));
    }
    results.innerHTML = hits.length ? hits.slice(0,8).map((h,i)=>`<div class="search-hit" data-i="${i}"><span>${escapeHtml(h.label)} <small>${escapeHtml(h.sub||'')}</small></span><small>${h.type}</small></div>`).join('')
      : `<div class="search-hit text-dim">No matches found.</div>`;
    results.classList.remove('hidden');
    $$('.search-hit',results).forEach((el,i)=>el.addEventListener('click',()=>{ hits[i] && hits[i].action(); results.classList.add('hidden'); input.value=''; }));
  },150));
  document.addEventListener('click',e=>{ if(!e.target.closest('.global-search')) results.classList.add('hidden'); });
}
/* SECTION: KEYBOARD SHORTCUTS */
document.addEventListener('keydown', e=>{
  if(!checkLoggedIn()) return;
  const tag=(e.target.tagName||'').toLowerCase();
  if(tag==='input'||tag==='textarea'||tag==='select') return;
  if(e.key==='/'){ e.preventDefault(); const inp=$('#global-search-input'); if(inp) inp.focus(); }
  else if(e.key==='n' && currentRoute()==='leads'){ openLeadModal(); }
});
/* SECTION: INIT */
function migrateDB(){
  let changed=false;
  if(!Array.isArray(DB.users)){
    DB.users=[{id:uid('user'), name:(DB.settings&&DB.settings.name)||'Alex Rivera', email:'demo@solariscrm.io', password:'demo1234', createdAt:new Date().toISOString()}];
    changed=true;
  }
  if(!DB.settings) DB.settings={};
  if(DB.settings.theme===undefined) DB.settings.theme='dark';
  if(DB.settings.sound===undefined) DB.settings.sound=true;
  if(DB.settings.name===undefined) DB.settings.name=DB.users[0].name;
  if(DB.settings.company===undefined) DB.settings.company='Solaris Automations';
  if(DB.settings.lang===undefined) DB.settings.lang='English';
  if(DB.settings.browserNotif===undefined) DB.settings.browserNotif=false;
  if(!Array.isArray(DB.leads)) { DB.leads=seedLeads(); changed=true; }
  if(!Array.isArray(DB.tasks)) { DB.tasks=seedTasks(); changed=true; }
  if(!Array.isArray(DB.events)) { DB.events=seedEvents(); changed=true; }
  if(!Array.isArray(DB.notifications)) DB.notifications=[];
  if(!DB.monthlyTarget) DB.monthlyTarget=2200000;
  // migrate any lead missing an id/lead-id-safe fields (guards against corrupted/partial records)
  DB.leads = DB.leads.filter(l=>l && typeof l==='object').map(l=>({
    id: l.id||uid('lead'), name:l.name||'Unnamed Lead', company:l.company||'—', phone:l.phone||'',
    email:l.email||'', source:l.source||'Website', status:PIPELINE_STAGES.includes(l.status)?l.status:'New Lead',
    priority:['High','Medium','Low'].includes(l.priority)?l.priority:'Medium', value:Number(l.value)||0,
    assigned:l.assigned||SALES_PEOPLE[0], nextFollowUp:l.nextFollowUp||new Date().toISOString().slice(0,10),
    notes:l.notes||'', score:Number(l.score)||randInt(40,90), createdAt:l.createdAt||new Date().toISOString().slice(0,10),
    recurring:!!l.recurring
  }));
  if(changed) saveDB();
}
function generateStartupNotifications(){
  if(!DB.notifications) DB.notifications=[];
  if(DB.notifications.length>0) return;
  const due=DB.leads.filter(l=>!['Won','Lost'].includes(l.status)&&daysUntil(l.nextFollowUp)<=0).slice(0,3);
  due.forEach(l=>pushNotification('Follow-up due', l.name+' at '+l.company+' needs a follow-up.','fa-bell'));
  const won=DB.leads.filter(l=>l.status==='Won').slice(0,2);
  won.forEach(l=>pushNotification('Sales Achievement 🎉', l.name+' closed for '+fmtMoney(l.value)+'.','fa-trophy'));
  saveDB();
}
function maybeSendBrowserNotifications(){
  if(!DB.settings.browserNotif) return;
  if(typeof Notification==='undefined' || Notification.permission!=='granted') return;
  const due=DB.leads.filter(l=>!['Won','Lost'].includes(l.status)&&daysUntil(l.nextFollowUp)<=0);
  if(!due.length) return;
  try{
    new Notification('Solaris CRM — Follow-ups due', { body: due.length+' lead(s) need attention today: '+due.slice(0,3).map(l=>l.name).join(', ') });
  }catch(e){ console.warn('Browser notification failed', e); }
}
(function init(){
  DB = loadDB();
  if(!DB){ DB = seedDB(); }
  try{ migrateDB(); }catch(err){ console.error('Migration failed, reseeding.', err); DB=seedDB(); }
  applyTheme();
  saveDB();
  generateStartupNotifications();
  initStarfield();
  initSolarSystem();
  initTilt();
  renderRoot();
  if(checkLoggedIn()){ mountAIAssistant(); setTimeout(maybeSendBrowserNotifications, 2000); }
  const origRenderRoot = renderRoot;
  window.renderRoot = function(){ origRenderRoot(); if(checkLoggedIn()) mountAIAssistant(); else { const f=$('#ai-fab'); if(f) f.remove(); const p=$('#ai-panel'); if(p) p.remove(); } };
  window.addEventListener('error', e=>{ console.error('Unhandled error:', e.error||e.message); });
})();


</script>
